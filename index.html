<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Pomodoro</title>

        <!-- <link rel="stylesheet" href="style.css" /> -->
        <script src="app.js" defer></script>
    </head>
    <body>
        <header>
            <h1>Pomodoro Timerr</h1>
            <p>
                Use pomodoro timer to boost your productivity and increase focus
                :]
            </p>
        </header>

        <main>
            <section>
                <!-- Timer goes first -->
                <div class="timer-mode">
                    <h2 id="timer-header">Current session</h2>
                    <p id="timer-status">Focus</p>
                </div>
                <div class="timer-display">
                    <p id="timer-display">00:00</p>
                </div>

                <div class="timer-meta">
                    <p id="cycle-count">Cycles completed: 0</p>
                </div>

                <div class="timer-controls">
                    <button type="button" id="start-btn">Start</button>
                    <button type="button" id="pause-btn">Pause</button>
                    <button type="button" id="reset-btn">Reset</button>
                </div>
            </section>

            <section class="settings">
                <h2 id="settings-header">Settings</h2>

                <form id="settings-form">
                    <fieldset>
                        <legend>Durations</legend>
                        <p><em>Enter time in minutes</em></p>
                        <label for="focus-duration">Focus Time</label>
                        <input
                            type="number"
                            id="focus-duration"
                            name="focus-duration"
                            min="1"
                            max="180"
                            value="25"
                        />
                        <label for="short-break-duration"
                            >Short Break Time</label
                        >
                        <input
                            type="number"
                            id="short-break-duration"
                            name="short-break-duration"
                            min="5"
                            max="60"
                            value="5"
                        />
                        <label for="long-break-duration">Long Break Time</label>
                        <input
                            type="number"
                            id="long-break-duration"
                            name="long-break-duration"
                            min="10"
                            max="90"
                            value="15"
                        />
                    </fieldset>
                    <button type="submit">Save Setting</button>
                </form>
            </section>
            <section class="history-section">
                <h2 id="history-header">History</h2>

                <ol id="history-list">
                    History goes here
                </ol>
            </section>
        </main>
        <footer>
            <h1>Foota</h1>
            <p>Nothing to see here yet. Go back up</p>
        </footer>
    </body>
</html>
